server.port=8090
spring.datasource.url=${LABEL_ENGINE_DB_URL:jdbc:postgresql://localhost:5433/label_engine}
spring.datasource.username=${LABEL_ENGINE_DB_USER:label_engine}
spring.datasource.password=${LABEL_ENGINE_DB_PASSWORD:label_engine}
spring.datasource.hikari.maximum-pool-size=5
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
